<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clearview — Personal Finance</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Core palette — deep navy premium */
  --bg:#0f1117;
  --bg2:#161b27;
  --bg3:#1e2538;
  --card:#1a2035;
  --card2:#202740;
  --border:#2a3350;
  --border2:#334060;
  --border3:#3d4d70;

  /* Text */
  --text:#e8ecf4;
  --text2:#9aa3bc;
  --text3:#5c6785;
  --text4:#3d4d6a;

  /* Gold/amber accent system */
  --gold:#d4a843;
  --gold2:#e8c068;
  --gold3:#f5d680;
  --gold-bg:rgba(212,168,67,.1);
  --gold-border:rgba(212,168,67,.25);

  /* Semantic colours */
  --green:#2ecc8a;
  --green-bg:rgba(46,204,138,.1);
  --green-border:rgba(46,204,138,.2);
  --red:#e05c6a;
  --red-bg:rgba(224,92,106,.1);
  --red-border:rgba(224,92,106,.2);
  --blue:#4d9de0;
  --blue-bg:rgba(77,157,224,.1);
  --blue-border:rgba(77,157,224,.2);
  --amber:#e8a040;
  --amber-bg:rgba(232,160,64,.1);
  --amber-border:rgba(232,160,64,.2);
  --purple:#9b6de0;
  --purple-bg:rgba(155,109,224,.1);
  --purple-border:rgba(155,109,224,.2);
  --teal:#2eccc4;
  --teal-bg:rgba(46,204,196,.1);

  /* Typography */
  --font:'Instrument Sans',sans-serif;
  --serif:'Instrument Serif',serif;
  --mono:'JetBrains Mono',monospace;

  /* Geometry */
  --r:14px;--r2:9px;--r3:24px;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  --shadow2:0 8px 32px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3);
  --glow-gold:0 0 20px rgba(212,168,67,.15);
}

body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── SIDEBAR ─────────────────────────────────────────────────── */
.app{display:flex;min-height:100vh}
.sidebar{
  width:228px;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto;
}
.main{margin-left:228px;flex:1;padding:28px;min-height:100vh;background:var(--bg)}

.logo{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
.logo-badge{
  width:32px;height:32px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#0f1117;
  box-shadow:0 2px 8px rgba(212,168,67,.35);
  flex-shrink:0;
}
.logo-name{font-size:15px;font-weight:600;letter-spacing:-.2px;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono);letter-spacing:.5px}

.nav{padding:10px 10px;flex:1}
.nav-section{
  font-size:10px;font-weight:600;color:var(--text4);
  letter-spacing:1px;text-transform:uppercase;
  padding:10px 8px 5px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:var(--r2);
  cursor:pointer;color:var(--text2);font-size:13px;font-weight:400;
  transition:all .15s;margin-bottom:2px;
  border:none;background:none;width:100%;text-align:left;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{
  background:linear-gradient(135deg,rgba(212,168,67,.15),rgba(212,168,67,.08));
  color:var(--gold2);
  border:1px solid var(--gold-border);
}
.nav-item.active .nav-icon{opacity:1;color:var(--gold)}
.nav-icon{width:15px;height:15px;opacity:.4;flex-shrink:0;transition:all .15s}
.nav-item:hover .nav-icon{opacity:.7}

.sidebar-footer{padding:12px 12px;border-top:1px solid var(--border)}
.sync-status{
  display:flex;align-items:center;gap:8px;font-size:12px;
  padding:8px 10px;border-radius:var(--r2);cursor:pointer;
  transition:all .15s;border:1px solid var(--border);
  background:var(--bg3);
}
.sync-status:hover{border-color:var(--border2)}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:var(--green);box-shadow:0 0 6px rgba(46,204,138,.5)}
.sync-dot.busy{background:var(--amber);animation:pulse .8s infinite}
.sync-dot.err{background:var(--red)}
.sync-dot.idle{background:var(--text4)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── PAGE STRUCTURE ──────────────────────────────────────────── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:24px;font-weight:600;letter-spacing:-.5px;color:var(--text)}
.page-sub{font-size:13px;color:var(--text3);margin-top:3px}
.header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

/* ── BUTTONS ─────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--r2);
  font-size:13px;font-weight:500;cursor:pointer;
  border:1px solid var(--border2);
  background:var(--card);color:var(--text);
  transition:all .15s;font-family:var(--font);
}
.btn:hover{background:var(--bg3);border-color:var(--border3)}
.btn-primary{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0f1117;border-color:transparent;font-weight:600;
  box-shadow:0 2px 8px rgba(212,168,67,.25);
}
.btn-primary:hover{
  background:linear-gradient(135deg,var(--gold2),var(--gold3));
  box-shadow:0 4px 14px rgba(212,168,67,.4);
  transform:translateY(-1px);
}
.btn-sm{padding:5px 11px;font-size:12px}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ── CARDS ───────────────────────────────────────────────────── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);padding:18px;
  box-shadow:var(--shadow);
}
.card-title{
  font-size:11px;font-weight:600;color:var(--text3);
  letter-spacing:.6px;text-transform:uppercase;margin-bottom:14px;
}

/* ── STAT CARDS ──────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:18px;position:relative;overflow:hidden;
  transition:border-color .2s;
}
.stat-card:hover{border-color:var(--border2)}
.stat-label{
  font-size:11px;font-weight:600;color:var(--text3);
  letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;
}
.stat-value{font-size:22px;font-weight:600;letter-spacing:-.6px;line-height:1;color:var(--text)}
.stat-sub{font-size:12px;color:var(--text3);margin-top:6px}
.stat-change{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;font-weight:600;padding:3px 8px;
  border-radius:20px;margin-top:6px;
}
.stat-change.up{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.stat-change.down{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.stat-accent{
  position:absolute;top:0;left:0;width:100%;height:2px;
  border-radius:var(--r) var(--r) 0 0;
}

/* ── LAYOUTS ─────────────────────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ── MONTH BAR ───────────────────────────────────────────────── */
.month-bar{display:flex;align-items:center;gap:5px;margin-bottom:20px;flex-wrap:wrap}
.month-chip{
  padding:5px 12px;border-radius:var(--r3);
  font-size:12px;font-weight:500;cursor:pointer;
  border:1px solid var(--border);background:var(--card);
  color:var(--text3);transition:all .15s;
}
.month-chip:hover{color:var(--text);border-color:var(--border2)}
.month-chip.active{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0f1117;border-color:transparent;font-weight:600;
}

/* ── FX BAR ──────────────────────────────────────────────────── */
.fx-bar{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:var(--blue-bg);
  border:1px solid var(--blue-border);
  border-radius:var(--r2);font-size:12px;color:var(--blue);
  margin-bottom:18px;
}

/* ── TABLES ──────────────────────────────────────────────────── */
.txn-table{width:100%;border-collapse:collapse}
.txn-table th{
  font-size:10px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.6px;
  padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;
}
.txn-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.txn-table tr:last-child td{border-bottom:none}
.txn-table tr:hover td{background:var(--bg3)}
.amount-neg{color:var(--red);font-weight:600;font-family:var(--mono);font-size:13px}
.amount-pos{color:var(--green);font-weight:600;font-family:var(--mono);font-size:13px}

/* ── CATEGORY PILLS ──────────────────────────────────────────── */
.cat-pill{
  display:inline-flex;align-items:center;padding:3px 9px;
  border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid transparent;
}
.cat-pill select{
  border:none;background:transparent;font-size:11px;font-weight:600;
  cursor:pointer;font-family:var(--font);padding:0;outline:none;color:inherit;
}
/* Category colours — dark theme adapted */
.cat-housing{background:rgba(46,204,138,.12);color:#2ecc8a;border-color:rgba(46,204,138,.2)}
.cat-utilities{background:rgba(232,160,64,.12);color:#e8a040;border-color:rgba(232,160,64,.2)}
.cat-subscriptions{background:rgba(77,157,224,.12);color:#4d9de0;border-color:rgba(77,157,224,.2)}
.cat-groceries{background:rgba(46,204,196,.12);color:#2eccc4;border-color:rgba(46,204,196,.2)}
.cat-dining{background:rgba(212,168,67,.12);color:#d4a843;border-color:rgba(212,168,67,.2)}
.cat-transport{background:rgba(155,109,224,.12);color:#9b6de0;border-color:rgba(155,109,224,.2)}
.cat-health{background:rgba(224,92,106,.12);color:#e05c6a;border-color:rgba(224,92,106,.2)}
.cat-entertainment{background:rgba(224,92,160,.12);color:#e05ca0;border-color:rgba(224,92,160,.2)}
.cat-travel{background:rgba(77,157,224,.12);color:#60b8f0;border-color:rgba(77,157,224,.2)}
.cat-shopping{background:rgba(160,155,100,.12);color:#b0a855;border-color:rgba(160,155,100,.2)}
.cat-misc{background:rgba(92,103,133,.12);color:#7a8ab0;border-color:rgba(92,103,133,.2)}
.cat-income{background:rgba(46,204,138,.12);color:#2ecc8a;border-color:rgba(46,204,138,.2)}

/* ── SOURCE BADGE ────────────────────────────────────────────── */
.source-badge{
  display:inline-flex;padding:2px 8px;border-radius:6px;
  font-size:11px;background:var(--bg3);
  border:1px solid var(--border2);color:var(--text3);
  font-family:var(--mono);
}

/* ── BUDGET BARS ─────────────────────────────────────────────── */
.budget-item{margin-bottom:16px}
.budget-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.budget-bar-bg{height:5px;border-radius:3px;background:var(--bg3);overflow:hidden}
.budget-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* ── GOAL CARDS ──────────────────────────────────────────────── */
.goal-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;margin-bottom:10px;
  transition:border-color .2s;
}
.goal-card:hover{border-color:var(--border2)}

/* ── MF TABLE ────────────────────────────────────────────────── */
.mf-row{
  display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;
  gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);
  align-items:center;font-size:13px;transition:background .15s;
}
.mf-row:hover{background:var(--bg3)}

/* ── IMPORT ──────────────────────────────────────────────────── */
.import-zone{
  border:1px dashed var(--border2);border-radius:var(--r);
  padding:28px;text-align:center;cursor:pointer;transition:all .2s;
  background:var(--bg3);
}
.import-zone:hover{border-color:var(--gold-border);background:var(--card)}

/* ── INSIGHTS ────────────────────────────────────────────────── */
.insight{
  display:flex;gap:14px;padding:14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:10px;
  transition:border-color .2s;
}
.insight:hover{border-color:var(--border2)}

/* ── MODAL ───────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:200;display:flex;align-items:center;justify-content:center;
}
.modal{
  background:var(--card2);border-radius:var(--r);
  width:520px;max-width:95vw;max-height:88vh;overflow-y:auto;
  box-shadow:var(--shadow2);border:1px solid var(--border2);
}
.modal-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:15px;font-weight:600;color:var(--text)}
.modal-close{cursor:pointer;color:var(--text3);font-size:22px;border:none;background:none;line-height:1;transition:color .15s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* ── FORMS ───────────────────────────────────────────────────── */
.form-row{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block}
.form-row input,.form-row select,.form-row textarea{width:100%}
input[type=text],input[type=number],select{
  height:36px;border:1px solid var(--border2);border-radius:var(--r2);
  padding:0 11px;font-size:13px;font-family:var(--font);
  background:var(--bg3);color:var(--text);outline:none;
  transition:border-color .15s;
}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px rgba(212,168,67,.08)}
textarea{
  border:1px solid var(--border2);border-radius:var(--r2);
  padding:10px 11px;font-size:13px;font-family:var(--font);
  background:var(--bg3);color:var(--text);outline:none;
  resize:vertical;width:100%;transition:border-color .15s;
}
textarea:focus{border-color:var(--gold-border)}
select option{background:var(--bg2)}

/* ── TOASTS ──────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;right:24px;
  padding:12px 18px;border-radius:var(--r2);
  font-size:13px;font-weight:500;
  box-shadow:var(--shadow2);z-index:300;
  animation:slideUp .2s ease;max-width:320px;
}
.toast.success{background:var(--card2);color:var(--text);border:1px solid var(--border2)}
.toast.error{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.toast.info{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── EMPTY STATES ────────────────────────────────────────────── */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}

/* ── SETUP BANNER ────────────────────────────────────────────── */
.setup-banner{
  background:var(--amber-bg);border:1px solid var(--amber-border);
  border-radius:var(--r);padding:14px 16px;margin-bottom:20px;
  display:flex;align-items:center;gap:12px;
}
.connected-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:var(--r3);font-size:11px;font-weight:600;
  background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);
}

/* ── TABS ────────────────────────────────────────────────────── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{
  padding:8px 16px;font-size:13px;cursor:pointer;
  border-bottom:2px solid transparent;color:var(--text3);
  font-weight:400;transition:all .15s;margin-bottom:-1px;
}
.tab.active{border-bottom-color:var(--gold);color:var(--gold2);font-weight:500}
.tab:hover:not(.active){color:var(--text)}

/* ── SCROLLBAR ───────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--border3)}

/* ── MOBILE ──────────────────────────────────────────────────── */
.mobile-menu{
  display:none;position:fixed;top:14px;left:14px;z-index:200;
  background:var(--card2);border:1px solid var(--border2);
  border-radius:var(--r2);padding:6px 11px;cursor:pointer;font-size:18px;color:var(--text);
}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:16px}
  .stats-grid{grid-template-columns:1fr 1fr !important}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .mobile-menu{display:flex}
}
</style>
</head>
<body>
<div class="app" id="app">
  <button class="mobile-menu" onclick="toggleSidebar()">☰</button>
  <nav class="sidebar" id="sidebar">
    <div class="logo">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="logo-badge">C</div>
        <div><div class="logo-name">Clearview</div><div class="logo-sub">AUD · INR</div></div>
      </div>
    </div>
    <div class="nav">
      <div class="nav-section">Overview</div>
      <button class="nav-item active" onclick="navigate('dashboard')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Dashboard
      </button>
      <div class="nav-section">Australia (AUD)</div>
      <button class="nav-item" onclick="navigate('expenses')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4v8M6 6h3a1 1 0 010 2H6a1 1 0 000 2h4"/></svg>Expenses
      </button>
      <button class="nav-item" onclick="navigate('income')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12L6 8l3 3 5-6"/><path d="M10 6h3v3"/></svg>Income
      </button>
      <button class="nav-item" onclick="navigate('budget')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="3.5" width="13" height="9" rx="1.5"/><path d="M5 9h6M5 6h3"/></svg>Budget
      </button>
      <button class="nav-item" onclick="navigate('goals')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><circle cx="8" cy="8" r="3"/></svg>Savings Goals
      </button>
      <div class="nav-section">India (INR)</div>
      <button class="nav-item" onclick="navigate('mutualfunds')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12L5 7l3 4 2-3 4 4"/></svg>Mutual Funds
      </button>
      <div class="nav-section">Property (AUD)</div>
      <button class="nav-item" onclick="navigate('realestate')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 14h14M2 14V6.5L8 2l6 4.5V14M6 14v-4h4v4"/></svg>
        Real Estate
      </button>
      <div class="nav-section">More</div>
      <button class="nav-item" onclick="navigate('import')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8m-3-3l3 3 3-3"/><path d="M3 13h10"/></svg>Import CSV
      </button>
      <button class="nav-item" onclick="navigate('insights')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2a6 6 0 100 12"/><path d="M12 2l-4 6h5"/></svg>Insights

// ── SHEETS API ────────────────────────────────────────────────────
async function sheetsCall(action, data={}) {
  if (!state.sheetsUrl) return {ok:false};
  setSyncState('busy');
  try {
    await fetch(state.sheetsUrl, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action, data})
    });
    setSyncState('ok');
    state.lastSync = new Date();
    updateSyncUI();
    saveState();
    return {ok:true};
  } catch(err) {
    setSyncState('err');
    return {ok:false};
  }
}

function setSyncState(s) {
  state.syncState = s;
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  const sub = document.getElementById('sync-sub');
  if (!dot) return;
  dot.className = 'sync-dot ' + s;
  if (s==='busy') { label.textContent='Syncing…'; sub.textContent='Writing to Sheets'; }
  if (s==='ok')   { label.textContent='Sheets connected'; sub.textContent=state.lastSync?'Synced '+state.lastSync.toLocaleTimeString():'Ready'; }
  if (s==='err')  { label.textContent='Sync error'; sub.textContent='Check URL in Settings'; }
  if (s==='idle') { label.textContent='Not connected'; sub.textContent='Add URL in Settings'; }
}

function updateSyncUI() { setSyncState(state.syncState); }

async function manualSync() {
  if (!state.sheetsUrl) { showToast('Add your Sheets URL in Settings first','info'); return; }
  showToast('Syncing all data to Sheets…','info');
  await sheetsCall('sync', {
    expenses: state.expenses,
    income: state.income,
    budget: state.budget,
    goals: state.goals,
    mutualFunds: state.mutualFunds,
    properties: state.properties,
    propertyLogs: state.propertyLogs,
    merchantRules: state.merchantRules,
    fxRate: state.fxRate,
    savingsBaseline: state.savingsBaseline,
  });
  showToast('Full sync complete ✓');
}

// ── HELPERS ───────────────────────────────────────────────────────
function fmt(n,d=2){return new Intl.NumberFormat('en-AU',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n||0)}
function fmtInr(n){return new Intl.NumberFormat('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0)}
function monthExp(m,y){return state.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y})}
function monthInc(m,y){return state.income.filter(i=>{const d=new Date(i.date);return d.getMonth()===m&&d.getFullYear()===y})}
function catTotals(exps){const t={};getCats().forEach(c=>t[c]=0);exps.forEach(e=>t[e.cat]=(t[e.cat]||0)+e.amount);return t}
function catClass(c){const base='cat-'+(c||'misc').toLowerCase().replace(/[^a-z]/g,'');return base||'cat-misc';}
function destroyCharts(){Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch(e){}});chartInstances={}}
function hour(){const h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening'}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}

function showToast(msg, type='success') {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast '+type; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

// ── NAVIGATION ────────────────────────────────────────────────────
function navigate(page) {
  destroyCharts();
  state.page=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.getAttribute('onclick')===`navigate('${page}')`));
  document.getElementById('sidebar').classList.remove('open');
  render();
}

function render() {
  const mc=document.getElementById('main-content');
  if (!mc) return;
  switch(state.page) {
    case 'dashboard':   mc.innerHTML=renderDashboard();  setTimeout(postDashboard,50); break;
    case 'expenses':    mc.innerHTML=renderExpenses();   break;
    case 'income':      mc.innerHTML=renderIncome();     break;
    case 'budget':      mc.innerHTML=renderBudget();     setTimeout(postBudget,50); break;
    case 'goals':       mc.innerHTML=renderGoals();      break;
    case 'mutualfunds': mc.innerHTML=renderMF();         break;
    case 'realestate':
      if (state._sheetsLoading) {
        mc.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px">
          <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite"></div>
          <div style="font-size:14px;color:var(--text3)">Loading from Sheets…</div>
        </div>`;
      } else {
        mc.innerHTML=renderRealEstate(); setTimeout(postRealEstate,50);
      }
      break;
    case 'import':      mc.innerHTML=renderImport();     break;
    case 'insights':    mc.innerHTML=renderInsights();   break;
    case 'settings':    mc.innerHTML=renderSettings();   break;
  }
}

function renderMonthBar() {
  return `<div class="month-bar">
    <button class="btn btn-sm" onclick="changeMonth(-1)">‹</button>
    ${MONTHS.map((mn,i)=>`<div class="month-chip ${i===state.month?'active':''}" onclick="setMonth(${i})">${mn}</div>`).join('')}
    <button class="btn btn-sm" onclick="changeMonth(1)">›</button>
  </div>`;
}
function setMonth(m){state.month=m;destroyCharts();render()}
function changeMonth(d){
  state.month+=d;
  if(state.month<0){state.month=11;state.year--}
  if(state.month>11){state.month=0;state.year++}
  destroyCharts();render();
}

// ── DASHBOARD ─────────────────────────────────────────────────────
function renderDashboard() {
  const m = state.month, y = state.year;
  const exps = monthExp(m, y);
  const incs = monthInc(m, y);
  const totalExp = exps.reduce((s,e) => s+e.amount, 0);
  const totalInc = incs.reduce((s,i) => s+i.amount, 0);
  const monthlySaved = totalInc - totalExp;

  // 3. Property equity — only if deposit entered (post-settlement)
  const propEquity = (state.properties||[]).reduce((s,p) => {

    return s + (p.depositPaid || 0);
  }, 0);
  const propCount = (state.properties||[]).length;

    <div style="display:flex;gap:28px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid rgba(212,168,67,.15)">
      <!-- Savings Balance -->
      <div>
        <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px">Savings Balance</div>
        <div style="font-size:20px;font-weight:600;color:#fff">A$${fmt(savingsBalance)}</div>

      </div>
      <!-- MF Portfolio -->

      </div>
      <!-- Property Equity -->
      <div>

        ${hasSettled

          : `<div style="font-size:14px;font-weight:500;color:rgba(255,255,255,.4);margin-top:4px">Settling 15 Apr 2026</div>

      <div class="stat-accent" style="background:linear-gradient(90deg,var(--green),var(--teal))"></div>

    </div>

  <div class="grid-3">

          </div>

      ${exps.length===0?`<div style="font-size:12px;color:var(--text3);padding:12px 0;text-align:center">No expenses for ${MONTHS[m]}</div>`:''}

        const pct=Math.min(100,Math.round(g.current/g.target*100));

function postDashboard() {
  const canvas=document.getElementById('catChart'); if(!canvas)return;
  const exps=monthExp(state.month,state.year);
  const cats=catTotals(exps);
  const labels=CATS.filter(c=>cats[c]>0); if(!labels.length)return;
  chartInstances.cat=new Chart(canvas,{type:'doughnut',data:{labels,datasets:[{data:labels.map(c=>cats[c]),backgroundColor:labels.map(c=>CAT_COLORS[c]),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`$${fmt(ctx.raw)}`}}},cutout:'65%'}});
}

    <table class="txn-table"><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Source</th><th>Amount</th><th></th></tr></thead>
    <tbody>${exps.map(e=>`<tr id="txn-${e.id}">
      <td style="font-family:var(--mono);font-size:12px;color:var(--text3)">${e.date}</td>
      <td><div style="font-weight:500">${e.desc}</div></td>
      <td><select class="cat-pill ${catClass(e.cat)}" onchange="reCat(${e.id},this.value,this)">
        ${getCats().map(c=>`<option value="${c}" ${c===e.cat?'selected':''}>${c}</option>`).join('')}
      </select></td>
      <td><span class="source-badge">${e.source||'Manual'}</span></td>
      <td><span class="amount-neg">-$${fmt(e.amount)}</span></td>
      <td><button class="btn btn-sm" style="padding:2px 7px;font-size:11px;color:var(--red)" onclick="deleteExpense(${e.id})">✕</button></td>
    </tr>`).join('')}</tbody></table>`}</div>`;
}

async function reCat(id,newCat,el) {
  const exp=state.expenses.find(e=>e.id===id); if(!exp)return;
  exp.cat=newCat; if(el)el.className=`cat-pill ${catClass(newCat)}`;
  saveState(); showToast(`Recategorised → ${newCat}`);
  await sheetsCall('saveExpense',exp);
  const key=exp.desc.toUpperCase().split(' ')[0];
  if(!state.merchantRules[key]){
    setTimeout(async()=>{
      if(confirm(`Save rule: always assign "${key}" → ${newCat}?`)){
        state.merchantRules[key]=newCat; saveState();
        await sheetsCall('saveRule',{key,category:newCat});
        showToast('Merchant rule saved ✓');
      }
    },200);
  }
}

async function deleteExpense(id) {
  state.expenses=state.expenses.filter(e=>e.id!==id);
  render(); saveState();
  await sheetsCall('deleteExpense',{id});
  showToast('Expense deleted');
}

async function parseMFCSV() {
  const raw=document.getElementById('mf-paste').value.trim();
  if(!raw){showToast('Paste CSV data first','error');return;}
  const lines=raw.split('\n').filter(l=>l.trim());
  if(!lines[0].toLowerCase().includes('fund')){showToast('Invalid format','error');return;}
  const parsed=[];
  for(let i=1;i<lines.length;i++){

    if(c.length<5)continue;
    parsed.push({id:Date.now()+i,name:c[0],folio:c[1],units:parseFloat(c[2])||0,avgNav:parseFloat(c[3])||0,currentNav:parseFloat(c[4])||0,type:c[5]||'Equity'});

  if(!parsed.length){showToast('No valid rows found','error');return;}
  state.mutualFunds=parsed; closeModal(); render(); saveState();
  await sheetsCall('sync',{mutualFunds:state.mutualFunds});

}

function handleCSV(input) {
  const files=Array.from(input.files); if(!files.length)return;
  const allRows=[]; let pending=files.length;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const lines=e.target.result.split('\n').filter(l=>l.trim());
      lines.slice(1).forEach(line=>{
        const cols=line.split(',').map(c=>c.replace(/"/g,'').trim());
        if(cols.length<3)return;
        const date=cols[0],desc=cols[2]||cols[1];
        const amount=Math.abs(parseFloat((cols[3]||cols[1]).replace(/[^0-9.\-]/g,'')))||0;
        if(!amount||!date)return;
        const key=desc.toUpperCase().split(' ')[0];
        const cat=state.merchantRules[key]||'Misc';
        const source=file.name.toLowerCase().includes('ubank')?'UBank':'CommBank';
        allRows.push({id:Date.now()+allRows.length,date,desc,amount,cat,source,tags:[],rule:!!state.merchantRules[key]});
      });
      if(--pending===0)showImportPreview(allRows);
    };
    reader.readAsText(file);
  });
}

function showImportPreview(rows) {
  state.pendingImport=rows;
  const preview=document.getElementById('import-preview'); if(!preview)return;
  preview.innerHTML=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="card-title" style="margin:0">Review ${rows.length} transactions</div>
      <button class="btn btn-primary btn-sm" onclick="confirmImport()">Confirm & Sync →</button>
    </div>
    <table class="txn-table"><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Source</th><th>Amount</th></tr></thead>
    <tbody>${rows.map((r,i)=>`<tr>
      <td style="font-family:var(--mono);font-size:12px;color:var(--text3)">${r.date}</td>
      <td style="font-weight:500">${r.desc}</td>
      <td><select class="cat-pill ${catClass(r.cat)}" onchange="updatePendingCat(${i},this.value,this)">
        ${getCats().map(c=>`<option value="${c}" ${c===r.cat?'selected':''}>${c}</option>`).join('')}
      </select></td>
      <td><span class="source-badge">${r.source}</span></td>
      <td><span class="amount-neg">-$${fmt(r.amount)}</span></td>
    </tr>`).join('')}</tbody></table></div>`;
}

function updatePendingCat(i,cat,el){state.pendingImport[i].cat=cat;if(el)el.className=`cat-pill ${catClass(cat)}`;}

  const count=state.pendingImport.length;
  state.expenses.push(...state.pendingImport);

function renderInsights() {
  const exps=monthExp(state.month,state.year),incs=monthInc(state.month,state.year);

  const totalInc=incs.reduce((s,i)=>s+i.amount,0);
  const totalExp=exps.reduce((s,e)=>s+e.amount,0);
  const savRate=totalInc>0?Math.round((totalInc-totalExp)/totalInc*100):0;
  const mfInv=state.mutualFunds.reduce((s,f)=>s+f.units*f.avgNav,0);
  const mfCur=state.mutualFunds.reduce((s,f)=>s+f.units*f.currentNav,0);
  const insights=[];
  if(cats.Dining>state.budget.Dining)insights.push({bg:'var(--red-bg)',icon:'🍽',title:`Dining is ${Math.round((cats.Dining/state.budget.Dining-1)*100)}% over budget`,body:`Spent $${fmt(cats.Dining)} vs $${fmt(state.budget.Dining)} budget. Cooking at home more could save ~$${fmt(cats.Dining*0.2)}/month.`,tag:'Over budget',tc:'var(--red)'});
  if(cats.Subscriptions>0)insights.push({bg:'var(--blue-bg)',icon:'📱',title:`$${fmt(cats.Subscriptions*12,0)}/year on subscriptions`,body:`$${fmt(cats.Subscriptions)}/month. Review each — cancel anything unused for 30+ days.`,tag:'Review',tc:'var(--blue)'});
  insights.push({bg:savRate>=20?'var(--green-bg)':'var(--amber-bg)',icon:'💰',title:`Savings rate: ${savRate}%`,body:`${savRate>=20?'Above the 20% target — great work!':'Aim for 20%.'} Saved $${fmt(Math.max(0,totalInc-totalExp))} this month.`,tag:savRate>=20?'On track':'Needs attention',tc:savRate>=20?'var(--green)':'var(--amber)'});
  if(mfInv>0)insights.push({bg:'var(--purple-bg)',icon:'📈',title:`MF portfolio ${((mfCur-mfInv)/mfInv*100).toFixed(1)}% overall`,body:`Current value ₹${fmtInr(mfCur)} (A$${fmt(mfCur/state.fxRate)}). Review allocation if equity > 80%.`,tag:'Portfolio',tc:'var(--purple)'});
  const ef=state.goals.find(g=>g.name.toLowerCase().includes('emergency'));
  if(ef){const months=ef.current/(totalExp||1);insights.push({bg:months>=3?'var(--green-bg)':'var(--amber-bg)',icon:'🛡',title:`Emergency fund: ${months.toFixed(1)} months`,body:`${months>=3?'Healthy — advisors recommend 3–6 months.':'Aim for 3–6 months. Prioritise before other goals.'} $${fmt(ef.current)} saved.`,tag:months>=3?'Healthy':'Build this',tc:months>=3?'var(--green)':'var(--amber)'});}
  return `<div class="page-header"><div><div class="page-title">Insights</div><div class="page-sub">${MONTHS[state.month]} · ${insights.length} observations</div></div></div>
  ${renderMonthBar()}
  ${insights.map(i=>`<div class="insight"><div style="width:32px;height:32px;border-radius:8px;background:${i.bg};display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${i.icon}</div>
    <div style="flex:1"><div style="font-size:13px;font-weight:500;margin-bottom:3px">${i.title}</div>
    <div style="font-size:12px;color:var(--text2);line-height:1.5">${i.body}</div>
    <div style="display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;margin-top:5px;background:${i.bg};color:${i.tc}">${i.tag}</div></div>

function parseCASText(raw) {
  // Normalise — collapse all whitespace variants to single space
  const text = raw.replace(/[\r\n]+/g,' ').replace(/\s+/g,' ');

  // ── Strategy 1: find each key field independently, then zip by order ──
  // This is robust against PDF.js fragmenting text across items

  const unitsAll   = [...text.matchAll(/Closing\s+Unit\s+Balance\s*:?\s*([\d,]+\.?\d*)/gi)].map(m=>parseFloat(m[1].replace(/,/g,'')));
  const navAll     = [...text.matchAll(/NAV\s+on\s+[\d\w\-]+\s*:?\s*INR\s*([\d,]+\.?\d+)/gi)].map(m=>parseFloat(m[1].replace(/,/g,'')));
  const costAll    = [...text.matchAll(/Total\s+Cost\s+Value\s*:?\s*([\d,]+\.?\d+)/gi)].map(m=>parseFloat(m[1].replace(/,/g,'')));
  const marketAll  = [...text.matchAll(/Market\s+Value\s+on\s+[\d\w\-]+\s*:?\s*INR\s*([\d,]+\.?\d+)/gi)].map(m=>parseFloat(m[1].replace(/,/g,'')));
  const folioAll   = [...text.matchAll(/Folio\s+No\s*:?\s*([\w\/\s]+?)\s+PAN\s*:/gi)].map(m=>m[1].replace(/\s+/g,'').trim());

  // Grab fund names — find lines with scheme codes (e.g. "K123D-Kotak Midcap Fund...")
  // These always contain "Direct" or "Growth" and appear before "ISIN:"
  const nameAll = [];
  // Match scheme code lines: optional code prefix + fund name + ISIN or end
  const nameRe = /([A-Z0-9]*[-–]\s*[A-Z][^\n]{15,200}?(?:Direct|Growth|Plan)[^\n]{0,100}?)\s*(?:-\s*ISIN\s*:|\s+Nominee\s*[12]|\s+Registrar)/gi;
  for (const m of text.matchAll(nameRe)) {
    let n = m[1].trim();
    // Strip scheme code prefix like "K123D-" "RMFSCAGG-" "P8042-"
    n = n.replace(/^[A-Z0-9]+[-–]\s*/,'');
    // Remove bracketed notes: (Non-Demat), (Erstwhile ...), (formerly ...), (Advisor:...)
    n = n.replace(/\s*\([^)]*(?:Non-Demat|Demat|Erstwhile|formerly|Advisor)[^)]*\)/gi,'');
    // Remove trailing " - ISIN:..." 
    n = n.replace(/\s*-\s*ISIN.*$/i,'').trim();
    // Remove trailing dash or bracket
    n = n.replace(/[-–\s]+$/, '').trim();
    if (n.length > 5) nameAll.push(n);
  }

  // ── Strategy 2: if Strategy 1 yields nothing, try alternate field labels ──
  // Some CAMS PDFs use slightly different wording
  if (!unitsAll.length) {
    const altUnits = [...text.matchAll(/Balance\s*:\s*([\d,]+\.[\d]+)/gi)].map(m=>parseFloat(m[1].replace(/,/g,'')));
    unitsAll.push(...altUnits);
  }

  const count = Math.max(unitsAll.length, costAll.length);
  if (!count) return [];

  const funds = [];
  for (let i=0; i<count; i++) {
    const units     = unitsAll[i]  || 0;
    const nav       = navAll[i]    || 0;
    const cost      = costAll[i]   || 0;
    const market    = marketAll[i] || 0;
    const folio     = folioAll[i]  || '';
    let   name      = nameAll[i]   || ('Fund ' + (i+1));
    const avgNav    = units > 0 ? parseFloat((cost/units).toFixed(4)) : 0;

    // Classify fund type
    const nl = name.toLowerCase();
    let type = 'Equity';
    if      (nl.includes('gold'))                                type = 'Gold';
    else if (nl.includes('debt')||nl.includes('bond')||nl.includes('liquid')||nl.includes('overnight')) type = 'Debt';
    else if (nl.includes('small cap'))                           type = 'Equity \u2013 Small Cap';
    else if (nl.includes('mid cap')||nl.includes('midcap'))      type = 'Equity \u2013 Mid Cap';
    else if (nl.includes('large cap')||nl.includes('bluechip'))  type = 'Equity \u2013 Large Cap';
    else if (nl.includes('flexi')||nl.includes('multi cap'))     type = 'Equity \u2013 Flexi Cap';
    else if (nl.includes('hybrid')||nl.includes('balanced'))     type = 'Hybrid';

    if (units > 0 || cost > 0) {
      funds.push({id:Date.now()+i, name, type, folio, units, avgNav, currentNav:nav, costValue:cost, marketValue:market});
    }
  }
  return funds;
}

async function importPDFFunds(funds) {
  if (typeof funds === 'string') funds = JSON.parse(funds);

  // ── Clean up fund names ───────────────────────────────────────
  funds = funds.map(f => {
    let name = f.name;

    // The name may have page-break garbage prepended, e.g.:
    // "Apr-2026 Page 2 of 3 Date Amount ... ICICI Prudential Mutual Fund PAN:... KYC: OK ... P 8145 - ICICI Prudential All Seasons Bond Fund..."
    // Strategy: find the LAST occurrence of a known fund house keyword and slice from there
    const houses = ['Parag Parikh','Mirae Asset','HDFC','ICICI Prudential','SBI','Kotak','Nippon India','Nippon','Axis','DSP','UTI','Canara','Tata','Franklin','Quant','Motilal Oswal','Aditya Birla'];
    let bestIdx = -1;
    for (const h of houses) {
      // Find ALL occurrences, take the last one
      let idx = -1, pos = 0;
      while ((pos = name.indexOf(h, pos)) !== -1) { idx = pos; pos++; }
      if (idx > bestIdx) bestIdx = idx;
    }
    if (bestIdx > 0) name = name.slice(bestIdx);

    // Now strip "Mutual Fund PAN: XXXX KYC: OK PAN: OK PersonName SCHEME_CODE - " prefix
    // that appears in page-break lines
    name = name.replace(/^[A-Za-z\s]+(?:Mutual Fund|MF)\s+PAN\s*:.*?(?:KYC\s*:\s*OK[^-]*?)\s*[-–]\s*/i, '');
    // Strip any remaining scheme code like "P 8145 -" or "K123D-" or "H5042-"
    name = name.replace(/^[A-Z]\s*\d+\s*[-–]\s*/,'');
    name = name.replace(/^[A-Z0-9]{3,8}[-–]\s*/,'');
    // Strip leading " - " if still there
    name = name.replace(/^\s*[-–]\s*/,'');
    // Normalise suffixes
    name = name
      .replace(/\s*-\s*Direct Plan\s*-\s*Growth(\s+Option)?\s*$/i, ' - Direct Growth')
      .replace(/\s*-\s*Direct Plan\s*Growth\s*$/i, ' - Direct Growth')
      .replace(/\s*-\s*DIRECT GROWTH PLAN GROWTH OPTION\s*$/i, ' - Direct Growth')
      .replace(/\s+/g,' ')
      .trim();

    return {...f, name};
  });

  // ── Merge with existing funds — match by folio, then by name keywords ─
  // This preserves funds from other PDFs (e.g. your funds when importing partner's)
  const merged = [...state.mutualFunds]; // start with existing

  funds.forEach(incoming => {
    // Try match by folio first
    let idx = merged.findIndex(m => m.folio && incoming.folio && m.folio === incoming.folio);
    // Fallback: match by first 3 significant words of fund name
    if (idx < 0) {
      const inWords = incoming.name.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>3).slice(0,3).join(' ');
      idx = merged.findIndex(m => {
        const mWords = m.name.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>3).slice(0,3).join(' ');
        return inWords && mWords && inWords === mWords;
      });
    }
    if (idx >= 0) {
      // Update existing fund
      merged[idx] = {...merged[idx], units: incoming.units, currentNav: incoming.currentNav, avgNav: incoming.avgNav, costValue: incoming.costValue, marketValue: incoming.marketValue};
    } else {
      // New fund — add it
      merged.push(incoming);
    }
  });

  state.mutualFunds = merged;
  closeModal(); render(); saveState();
  await sheetsCall('sync', {mutualFunds: state.mutualFunds});
  showToast(`${funds.length} fund(s) imported · ${merged.length} total in portfolio ✓`);
}

const RE_LOG_CATS = ['Conveyancing / Legal','Stamp Duty','Building & Pest Inspection','Council Rates','Water Rates','Landlord Insurance','Repairs & Maintenance','Property Management Fee','Accounting / Tax','Quantity Surveyor','Depreciation (Div 43)','Depreciation (Div 40)','Sundry / Misc','Rental Income'];
const RE_DEDUCT = ['CGT cost base','Fully deductible','Not deductible','Rental income'];

function currentFY() {
  const now = new Date();
  return now.getMonth() >= 6 ? `FY${now.getFullYear()}/${String(now.getFullYear()+1).slice(2)}` : `FY${now.getFullYear()-1}/${String(now.getFullYear()).slice(2)}`;
}
function fyForDate(d) {
  const dt = new Date(d);
  const y = dt.getFullYear(), m = dt.getMonth();
  return m >= 6 ? `FY${y}/${String(y+1).slice(2)}` : `FY${y-1}/${String(y).slice(2)}`;
}
function prevFY() {
  const now = new Date();
  const y = now.getMonth() >= 6 ? now.getFullYear()-1 : now.getFullYear()-2;
  return `FY${y}/${String(y+1).slice(2)}`;
}
function calcProperty(p) {
  const now = new Date();
  const settlementDate = p.settlementDate ? new Date(p.settlementDate) : now;
  const tenancyDate = p.tenancyStart ? new Date(p.tenancyStart) : null;
  const isPreTenancy = !tenancyDate || tenancyDate > now;
  const yearsOwned = Math.max(0, (now - settlementDate) / (365.25*24*3600*1000));

  // Property value & loan
  const estValue = p.purchasePrice * Math.pow(1 + (p.growthRate||0.04), Math.max(yearsOwned, 0));
  const r = (p.interestRate||0.0689) / 12;
  const n = (p.loanTermYears||30) * 12;
  const monthsPaid = Math.floor(yearsOwned * 12);
  const loanBalance = monthsPaid > 0 && r > 0
    ? p.loanAmount * (Math.pow(1+r,n) - Math.pow(1+r,monthsPaid)) / (Math.pow(1+r,n) - 1)
    : p.loanAmount;
  const equity = estValue - loanBalance;

  // Rental income — only if tenanted
  const annualRent = isPreTenancy ? 0 : p.weeklyRent * (52 - (p.vacancyWeeks||2));
  const grossYield = p.purchasePrice > 0 ? (p.weeklyRent * 52) / p.purchasePrice : 0; // based on potential rent

  // Annual expenses (always running once settled)
  const annualInterest = p.loanAmount * (p.interestRate||0.0689);
  const annualMgmt = isPreTenancy ? 0 : annualRent * (p.propertyMgmtPct||0.066);
  const totalDeductions = annualInterest + annualMgmt + (p.councilRates||0) + (p.waterRates||0)
    + (p.landlordInsurance||0) + (p.repairsMaintenance||0) + (p.accounting||0)
    + (p.divisionFortyThreeAnnual||0) + (p.divisionFortyOngoing||0);
  const netRental = annualRent - totalDeductions;
  const taxSavingO1 = netRental < 0 ? Math.abs(netRental) * (p.owner1Share||0.5) * ((p.owner1TaxRate||0.37) + (p.medicareLevy||0.02)) : 0;
  const taxSavingO2 = netRental < 0 ? Math.abs(netRental) * (p.owner2Share||0.5) * ((p.owner2TaxRate||0.37) + (p.medicareLevy||0.02)) : 0;
  const totalTaxSaving = taxSavingO1 + taxSavingO2;
  const cashExpenses = annualInterest + annualMgmt + (p.councilRates||0) + (p.waterRates||0)
    + (p.landlordInsurance||0) + (p.repairsMaintenance||0) + (p.accounting||0);
  const netCashFlow = annualRent - cashExpenses;
  const afterTaxCashFlow = netCashFlow + totalTaxSaving;
  const weeklyCost = afterTaxCashFlow / 52;
  return {estValue,loanBalance,equity,annualRent,grossYield,annualInterest,annualMgmt,
    totalDeductions,netRental,totalTaxSaving,cashExpenses,netCashFlow,afterTaxCashFlow,
    weeklyCost,isPreTenancy,settlementDate,tenancyDate};
}

function renderCashFlowTable(p, c, fy) {
  // Get actual logged expenses for this FY
  const logs = (state.propertyLogs||[]).filter(l=>l.propertyId===p.id && fyForDate(l.date)===fy);
  const loggedIncome = logs.filter(l=>l.cat==='Rental Income').reduce((s,l)=>s+l.amount,0);
  const loggedExpenses = logs.filter(l=>l.cat!=='Rental Income').reduce((s,l)=>s+l.amount,0);
  const hasLogs = logs.length > 0;

  // Auto-calculated vs logged
  const rentIncome = hasLogs && loggedIncome > 0 ? loggedIncome : c.annualRent;
  const rows = [
    {label:'Gross Rental Income', val:rentIncome, positive:true, note:'auto-calc'},
    {label:'Interest on Loan', val:-c.annualInterest, note:'auto-calc'},
    {label:'Property Management', val:-c.annualMgmt, note:'auto-calc'},
    {label:'Council Rates', val:-p.councilRates},
    {label:'Water Rates', val:-p.waterRates},
    {label:'Landlord Insurance', val:-p.landlordInsurance},
    {label:'Repairs & Maintenance', val:-p.repairsMaintenance},
    {label:'Accounting', val:-p.accounting},
    {label:'Depreciation (Div 43+40)', val:-(p.divisionFortyThreeAnnual+p.divisionFortyOngoing)},
  ];
  const totalDeductions = rows.slice(1).reduce((s,r)=>s+r.val,0);
  const netRental = rentIncome + totalDeductions;
  const taxSaving = netRental < 0 ? Math.abs(netRental) * (p.owner1Share*(p.owner1TaxRate+p.medicareLevy) + p.owner2Share*(p.owner2TaxRate+p.medicareLevy)) : 0;
  const cashExp = -(c.annualInterest + c.annualMgmt + p.councilRates + p.waterRates + p.landlordInsurance + p.repairsMaintenance + p.accounting);
  const netCash = rentIncome + cashExp;
  const afterTax = netCash + taxSaving;

  return `
  <table style="width:100%;border-collapse:collapse;font-size:13px">
    ${rows.map(r=>`<tr>
      <td style="padding:5px 0;color:var(--text2);border-bottom:1px solid var(--border)">${r.label}</td>
      <td style="padding:5px 0;text-align:right;font-family:var(--mono);border-bottom:1px solid var(--border);color:${r.val>=0?'var(--green)':'var(--text)'}">${r.val>=0?'+':''}$${fmt(Math.abs(r.val),0)}</td>
    </tr>`).join('')}
    <tr style="background:var(--bg)">
      <td style="padding:6px 4px;font-weight:600;border-bottom:1px solid var(--border)">Net Rental Position</td>
      <td style="padding:6px 4px;text-align:right;font-family:var(--mono);font-weight:600;border-bottom:1px solid var(--border);color:${netRental>=0?'var(--green)':'var(--red)'}">${netRental>=0?'+':''}$${fmt(Math.abs(netRental),0)}</td>
    </tr>
    <tr>
      <td style="padding:5px 0;color:var(--green);border-bottom:1px solid var(--border)">Tax Saving (neg. gearing)</td>
      <td style="padding:5px 0;text-align:right;font-family:var(--mono);color:var(--green);border-bottom:1px solid var(--border)">+$${fmt(taxSaving,0)}</td>
    </tr>
    <tr style="background:var(--blue-bg);border-radius:4px">
      <td style="padding:6px 4px;font-weight:600">After-Tax Cash Flow</td>
      <td style="padding:6px 4px;text-align:right;font-family:var(--mono);font-weight:600;color:${afterTax>=0?'var(--green)':'var(--red)'}">${afterTax>=0?'+':''}$${fmt(Math.abs(afterTax),0)}<span style="font-size:11px;font-weight:400;margin-left:4px">(${afterTax>=0?'+':''}$${fmt(Math.abs(afterTax/52),0)}/wk)</span></td>
    </tr>
  </table>`;
}

  document.getElementById('modal-body').innerHTML = `
    <div class="form-row"><label class="form-label">Property</label>
      <select id="log-propId">${props.map(p=>`<option value="${p.id}" ${p.id===propertyId?'selected':''}>${p.address.split(',')[0]}</option>`).join('')}</select></div>
    <div class="form-row"><label class="form-label">Date</label><input type="text" id="log-date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="form-row"><label class="form-label">Description</label><input type="text" id="log-desc" placeholder="e.g. Council rates Q1"></div>
    <div class="form-row"><label class="form-label">Amount ($)</label><input type="number" id="log-amount" step="0.01" placeholder="0.00"></div>
    <div class="form-row"><label class="form-label">Category</label>
      <select id="log-cat">${RE_LOG_CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div class="form-row"><label class="form-label">Deductibility</label>
      <select id="log-deduct">${RE_DEDUCT.map(d=>`<option>${d}</option>`).join('')}</select></div>
    <div class="form-row"><label class="form-label">Receipt?</label>
      <select id="log-receipt"><option value="true">Yes</option><option value="false">No</option></select></div>`;
  document.getElementById('modal-footer').innerHTML = `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveLog()">Save & Sync</button>`;
  document.getElementById('modal').style.display = 'flex';
}

async function saveLog() {
  const date=document.getElementById('log-date').value;
  const desc=document.getElementById('log-desc').value;
  const amount=parseFloat(document.getElementById('log-amount').value);
  const cat=document.getElementById('log-cat').value;
  const deductibility=document.getElementById('log-deduct').value;
  const receipt=document.getElementById('log-receipt').value==='true';
  const propertyId=parseInt(document.getElementById('log-propId').value);
  if(!desc||!amount){showToast('Fill description and amount','error');return;}
  const log={id:Date.now(),propertyId,date,desc,amount,cat,deductibility,receipt};
  state.propertyLogs.push(log);
  closeModal();render();saveState();
  await sheetsCall('savePropertyLog',log);
  showToast('Logged ✓');
}

async function deleteLog(id) {
  state.propertyLogs=state.propertyLogs.filter(l=>l.id!==id);
  render();saveState();
  await sheetsCall('deletePropertyLog',{id});
  showToast('Deleted');
}


// ── INIT ──────────────────────────────────────────────────────────

// ── LOAD FROM SHEETS ──────────────────────────────────────────────
async function loadFromSheets() {
  if (!state.sheetsUrl) return false;
  setSyncState('busy');
  try {
    // Use a JSONP-style GET request since no-cors POST can't read responses
    const data = await new Promise((resolve, reject) => {
      const cbName = '_cv_load_' + Date.now();
      const timeout = setTimeout(() => {
        delete window[cbName];
        reject(new Error('timeout'));
      }, 10000);
      window[cbName] = (d) => {
        clearTimeout(timeout);
        delete window[cbName];
        resolve(d);
      };
      const s = document.createElement('script');
      s.src = state.sheetsUrl + '?callback=' + cbName + '&action=load&_=' + Date.now();
      s.onerror = () => { clearTimeout(timeout); reject(new Error('load failed')); };
      document.head.appendChild(s);
      setTimeout(() => document.head.removeChild(s), 12000);
    });

    if (!data || !data.ok) { setSyncState('err'); return false; }

    // Merge Sheets data into state — Sheets wins over seed
    if (data.expenses?.length)     state.expenses     = data.expenses;
    if (data.income?.length)       state.income       = data.income;
    if (data.goals?.length)        state.goals        = data.goals;
    if (data.mutualFunds?.length)  state.mutualFunds  = data.mutualFunds;
    if (data.properties?.length)   state.properties   = data.properties;
    if (data.propertyLogs?.length) state.propertyLogs = data.propertyLogs;
    if (data.budget && Object.keys(data.budget).length) state.budget = data.budget;
    if (data.merchantRules)        state.merchantRules = data.merchantRules;
    if (data.fxRate)               state.fxRate        = data.fxRate;
    if (data.savingsBaseline != null) state.savingsBaseline = data.savingsBaseline;

    setSyncState('ok');
    state.lastSync = new Date();
    updateSyncUI();
    return true;
  } catch(e) {
    console.warn('Sheets load failed:', e.message);
    setSyncState('err');
    return false;
  }
}

// ── APP STARTUP ───────────────────────────────────────────────────
state._sheetsLoading = true;
render(); // render immediately with seed data (shows loading for RE)
setSyncState('idle');

// Then load live data from Sheets + fetch FX rate in parallel
setTimeout(async () => {
  // Chart.js dark defaults
  if (typeof Chart !== 'undefined') {
    Chart.defaults.color = '#9aa3bc';
    Chart.defaults.borderColor = '#2a3350';
    if (Chart.defaults.plugins?.legend?.labels)
      Chart.defaults.plugins.legend.labels.color = '#9aa3bc';
  }

  // Load from Sheets
  if (state.sheetsUrl) {
    setSyncState('busy');
    document.getElementById('sync-label').textContent = 'Loading from Sheets…';
    try {
      const loaded = await loadFromSheets();
      state._sheetsLoading = false;
    if (loaded) {
        showToast('Data loaded from Sheets ✓');
    } else {
        // Sheets load failed — use seed data but clear loading state
        state._sheetsLoading = false;
    }
    render(); // always re-render after attempt
    } catch(e) {
      state._sheetsLoading = false;
      setSyncState('err');
      render();
    }
  } else {
    state._sheetsLoading = false;
    render();
  }

  // Fetch live FX rate
  try {
    const res = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/aud.json');
    const data = await res.json();
    const rate = data?.aud?.inr;
    if (rate && !isNaN(rate)) {
      state.fxRate = parseFloat(rate.toFixed(2));
      state.fxLastUpdated = new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
      render();
    }
  } catch(e) {}
}, 200);
</script>
